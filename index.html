<!DOCTYPE html>
<html lang='es' data-theme='dark'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>La Clave Academy | Tienda SSH</title>
    <link href='https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css' rel='stylesheet' />
    <script src='https://cdn.tailwindcss.com'></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .nav-glass { background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .card-course { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; overflow: hidden; transition: 0.3s; }
        .card-course:hover { border-color: #ff0000; transform: translateY(-5px); }
        .img-c { height: 120px; display: flex; align-items: center; justify-content: center; background: #050505; }
        .img-c img { max-width: 80%; max-height: 80%; object-fit: contain; }
    </style>
</head>
<body>
    <div class='drawer'>
        <input id='drawer' type='checkbox' class='drawer-toggle' />
        <div class='drawer-content flex flex-col'>
            <div class='navbar w-full nav-glass sticky top-0 z-50 px-4'>
                <div class='flex-none'><label for='drawer' class='btn btn-square btn-ghost text-white'>☰</label></div>
                <div class='flex-1 font-bold text-xl text-white uppercase ml-2 tracking-tighter'>LA CLAVE <span class='text-red-600'>ARGENTINA</span></div>
            </div>
            <main class='min-h-screen text-center p-4'>
                <h1 class='text-6xl font-black mt-20 mb-4 uppercase'>TIENDA <span class='text-red-600 italic'>SSH</span></h1>
                <p class='text-zinc-500 mb-10'>+65.000 Cursos Certificados | La Clave Academy</p>
                <div class='max-w-xl mx-auto mb-16'><input id='q' type='text' placeholder='¿Qué quieres aprender?' class='input input-bordered w-full rounded-full bg-zinc-900 border-zinc-800' oninput='search()'/></div>
                <div id='grid' class='grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-6 max-w-[1600px] mx-auto px-4'></div>
            </main>
            <footer class='footer p-10 bg-zinc-950 border-t border-zinc-900 mt-20'>
                <nav><header class='footer-title text-red-600'>Nosotros</header><a class='link link-hover' onclick='alert("La Clave Argentina: Élite Educativa.")'>Quiénes Somos</a><a class='link link-hover'>Aviso Legal</a></nav>
            </footer>
        </div>
        <div class='drawer-side z-[100]'><label for='drawer' class='drawer-overlay'></label>
            <ul class='menu p-6 w-80 min-h-full bg-black text-white border-r border-zinc-800'>
                <li class='mb-10 text-2xl font-bold italic uppercase'>MENU <span class='text-red-600'>SSH</span></li>
                <li class='menu-title text-red-600'>Categorías</li>
                <li><a onclick='loadCat("programacion")'>Programación</a></li>
                <li><a onclick='loadCat("diseno")'>Diseño</a></li>
                <div class='divider opacity-10'></div>
                <li><a onclick='alert("FAQ: Acceso vía SSH seguro.")'>Preguntas Frecuentes</a></li>
            </ul>
        </div>
    </div>
    <script>
        const K = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b', U = 'https://ypzudkxowpxvdggvongz.supabase.co/rest/v1/cursos';
        async function load(q="", c="") {
            const g = document.getElementById("grid"); g.innerHTML = "";
            let url = U + "?select=titulo,plataforma,url,imagen_url&limit=25&order=titulo.asc";
            if(q) url += "&or=(titulo.ilike.*" + encodeURIComponent(q) + "*,descripcion.ilike.*" + encodeURIComponent(q) + "*)";
            if(c) url += "&categoria=ilike.*" + encodeURIComponent(c) + "*";
            try {
                const r = await fetch(url, { headers: { "apikey": K, "Authorization": "Bearer " + K } });
                const d = await r.json();
                d.forEach(x => {
                    const img = x.imagen_url || "https://raw.githubusercontent.com/florenciaamor36-ship-it/cursin-v2-oficial/main/youtube_fallback.jpg";
                    g.innerHTML += "<div class='card-course'><div class='img-c'><img src='" + img + "'></div><div class='p-4 text-left'><div class='text-[9px] font-bold text-red-600 uppercase mb-1'>" + x.plataforma + "</div><h3 class='font-bold text-xs line-clamp-2 h-8 mb-4 text-white'>" + x.titulo + "</h3><a href='" + x.url + "' target='_blank' class='btn btn-block btn-xs btn-error text-white font-bold uppercase rounded-lg'>Acceder</a></div></div>";
                });
            } catch(e) {}
        }
        function search() { clearTimeout(window.t); window.t = setTimeout(() => load(document.getElementById("q").value), 600); }
        function loadCat(c) { document.getElementById("q").value = ""; load("", c); document.getElementById("drawer").checked = false; }
        load();
    </script>
</body>
</html>
